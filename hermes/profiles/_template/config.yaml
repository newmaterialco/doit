# Per-user Hermes profile config.
# Copy this to ~/.hermes/profiles/<user>/config.yaml on the VM, then create
# the matching .env from .env.example.
#
# Each user runs as a separate Hermes profile for isolation:
#   - Own memory (memories/MEMORY.md, memories/USER.md)
#   - Own Composio OAuth connections (entity = user_id)
#   - Own API server port + bearer key

# --- Composio session MCP: one per user ---
# Create with Composio v3 (`composio.create(user_id=...)`) and paste
# `session.mcp.url` plus `session.mcp.headers` here.
mcp_servers:
  composio:
    url: "replace-with-session-mcp-url"
    headers:
      x-api-key: "replace-with-session-mcp-header-value"
  # Official Figma MCP (https://mcp.figma.com/mcp) is intentionally not
  # enabled here yet. A direct Hermes profile connection currently receives
  # 401 Unauthorized because Figma expects an OAuth flow from a supported MCP
  # client (Cursor, VS Code, Claude Code, Codex, etc.). Keep using the
  # Composio `figma` toolkit for file/resource access until Hermes supports
  # Figma MCP auth directly or Doit provides an authenticated bridge.
  #
  # figma:
  #   url: "https://mcp.figma.com/mcp"

# --- Native persistent memory (Hermes built-in) ---
# Hermes injects MEMORY.md and USER.md into the system prompt at session start
# and lets the agent curate them via the `memory` tool. We rely on this layer
# for cross-todo recall instead of re-injecting facts from Supabase on every
# run. Doit's runner mirrors these files into Supabase so the app's Settings >
# Memory screen can show what the agent has learned and let the user pin facts.
memory:
  memory_enabled: true        # MEMORY.md (~8,000 chars, agent notes)
  user_profile_enabled: true  # USER.md (~4,000 chars, user profile)
  memory_char_limit: 8000
  user_char_limit: 4000

# Browserbase-backed browsing is enabled for public web tasks. Hermes still
# routes private/loopback URLs to a local sidecar so cloud browsers never try to
# reach the VM's internal network.
browser:
  cloud_provider: browserbase
  auto_local_for_private_urls: true

# The browse.sh CLI runs through Hermes' terminal tool. Pass only the
# Browserbase credentials it needs for remote browser sessions.
terminal:
  env_passthrough:
    - BROWSERBASE_API_KEY
    - BROWSERBASE_PROJECT_ID

# Keep higher-risk delegation disabled on the cloud box.
#
# Terminal is intentionally enabled so browse.sh skills that use the `browse`
# CLI can execute exactly as documented. Do not add general filesystem or
# delegate access without a separate security review.
disabled_toolsets:
  - delegate
